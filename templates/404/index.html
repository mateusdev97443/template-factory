<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Página não encontrada - Erro 404">
    <title>404 - Página não encontrada | Template Factory</title>
    
    <!-- Core System -->
    <link rel="stylesheet" href="../../base/css/tokens.css">
    <link rel="stylesheet" href="../../base/css/reset.css">
    <link rel="stylesheet" href="../../base/css/components.css">
    
    <!-- Template Specific -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="error-404-body">

    <main class="error-404-container" role="main">
        
        <div class="error-404-content">
            
            <!-- Illustration -->
            <div class="error-404-illustration" aria-hidden="true">
                <svg class="error-404-svg" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
                    <!-- Broken Link Icon -->
                    <g transform="translate(200, 150)">
                        <!-- Chain Link Left -->
                        <ellipse cx="-60" cy="0" rx="40" ry="60" fill="none" stroke="#10b981" stroke-width="8" opacity="0.6"/>
                        
                        <!-- Chain Link Right -->
                        <ellipse cx="60" cy="0" rx="40" ry="60" fill="none" stroke="#10b981" stroke-width="8" opacity="0.6"/>
                        
                        <!-- Break Lines -->
                        <line x1="-20" y1="-40" x2="-10" y2="-60" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
                        <line x1="20" y1="-40" x2="10" y2="-60" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
                        <line x1="-20" y1="40" x2="-10" y2="60" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
                        <line x1="20" y1="40" x2="10" y2="60" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
                        
                        <!-- X Mark -->
                        <circle cx="0" cy="0" r="25" fill="#ef4444" opacity="0.9"/>
                        <line x1="-10" y1="-10" x2="10" y2="10" stroke="white" stroke-width="4" stroke-linecap="round"/>
                        <line x1="10" y1="-10" x2="-10" y2="10" stroke="white" stroke-width="4" stroke-linecap="round"/>
                    </g>
                    
                    <!-- Decorative Elements -->
                    <circle cx="80" cy="80" r="8" fill="#10b981" opacity="0.3"/>
                    <circle cx="320" cy="80" r="6" fill="#10b981" opacity="0.3"/>
                    <circle cx="80" cy="220" r="6" fill="#10b981" opacity="0.3"/>
                    <circle cx="320" cy="220" r="8" fill="#10b981" opacity="0.3"/>
                </svg>
            </div>

            <!-- Error Code -->
            <div class="error-404-code">
                404
            </div>

            <!-- Message -->
            <h1 class="error-404-title">Oops! Página não encontrada</h1>
            <p class="error-404-message">
                A página que você está procurando pode ter sido removida, teve seu nome alterado ou está temporariamente indisponível.
            </p>

            <!-- Actions -->
            <div class="error-404-actions">
                <a href="/" class="btn btn--primary error-404-button">
                    ← Voltar ao início
                </a>
                <a href="javascript:history.back()" class="btn btn--secondary error-404-button">
                    ← Página anterior
                </a>
            </div>

        </div>

    </main>

</body>
</html>
