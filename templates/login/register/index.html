<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cadastro - Template Factory">
    <title>Cadastro | Template Factory</title>
    
    <!-- Core System -->
    <link rel="stylesheet" href="../../../base/css/tokens.css">
    <link rel="stylesheet" href="../../../base/css/reset.css">
    <link rel="stylesheet" href="../../../base/css/components.css">
    
    <!-- Template Specific -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="register-body">

    <main class="register-container" role="main">
        <section class="register-card" aria-labelledby="register-title">
            
            <header class="register-header">
                <h1 id="register-title" class="register-title">Criar conta</h1>
                <p class="register-subtitle">Preencha os dados abaixo para se cadastrar</p>
            </header>

            <form class="register-form" id="registerForm" novalidate>
                
                <div class="form-group">
                    <label for="name" class="label label--required">Nome completo</label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name" 
                        class="input" 
                        placeholder="Seu nome completo"
                        autocomplete="name"
                        required
                    >
                    <span class="form-helper form-helper--error" aria-live="polite"></span>
                </div>

                <div class="form-group">
                    <label for="email" class="label label--required">E-mail</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="input" 
                        placeholder="seu@email.com"
                        autocomplete="email"
                        required
                    >
                    <span class="form-helper form-helper--error" aria-live="polite"></span>
                </div>

                <div class="form-group">
                    <label for="password" class="label label--required">Senha</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="input" 
                        placeholder="Mínimo 8 caracteres"
                        autocomplete="new-password"
                        required
                        minlength="8"
                    >
                    <span class="form-helper form-helper--error" aria-live="polite"></span>
                </div>

                <div class="form-group">
                    <label for="confirmPassword" class="label label--required">Confirmar senha</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        class="input" 
                        placeholder="Repita a senha"
                        autocomplete="new-password"
                        required
                    >
                    <span class="form-helper form-helper--error" aria-live="polite"></span>
                </div>

                <div class="form-group form-group--terms">
                    <label class="checkbox-label">
                        <input type="checkbox" name="terms" class="checkbox-input" required>
                        <span class="checkbox-text">
                            Li e aceito os <a href="#" class="register-link">Termos de Uso</a>
                        </span>
                    </label>
                </div>

                <button type="submit" class="btn btn--primary register-button">
                    Criar conta
                </button>

            </form>

            <footer class="register-footer">
                <p class="register-footer__text">
                    Já tem conta? <a href="#" class="register-link">Faça login</a>
                </p>
            </footer>

        </section>
    </main>

</body>
</html>
