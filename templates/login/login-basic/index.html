<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Template Factory</title>
    
    <!-- Core System -->
    <link rel="stylesheet" href="../../../base/css/tokens.css">
    <link rel="stylesheet" href="../../../base/css/reset.css">
    
    <!-- Template Specific -->
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <main class="login-wrapper" role="main">
        <section class="login-card" aria-labelledby="login-title">
            
            <header class="login-header">
                <h1 id="login-title" class="login-title">Acesse sua conta</h1>
                <p class="login-subtitle">Entre com suas credenciais para continuar.</p>
            </header>

            <form class="login-form" id="loginForm" novalidate>
                <div class="form-field">
                    <label for="email" class="form-label">E-mail</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        placeholder="seu@email.com"
                        autocomplete="email"
                        required
                    >
                </div>

                <div class="form-field">
                    <div class="form-label-wrapper">
                        <label for="password" class="form-label">Senha</label>
                        <a href="#" class="form-link">Esqueceu?</a>
                    </div>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="••••••••"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <button type="submit" class="btn-primary">
                    Entrar
                </button>
            </form>

        </section>
    </main>

    <!-- Core JS -->
    <script src="../../../base/js/utils.js" defer></script>
</body>
</html>
